<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 60" fill="none">
  <!-- Left lean-to / hip roof section -->
  <polygon points="4,34 18,22 18,42 4,42" fill="currentColor"/>
  <!-- Left wall face (shadow side) -->
  <polygon points="4,34 18,22 18,34" fill="currentColor" opacity="0.6"/>

  <!-- Main body roof — gable -->
  <polygon points="44,4 70,34 18,34" fill="currentColor"/>
  <!-- Roof shadow underside on left -->
  <polygon points="18,34 4,34 18,22" fill="currentColor" opacity="0.35"/>

  <!-- Main front wall -->
  <rect x="18" y="34" width="44" height="20" fill="currentColor"/>

  <!-- Right extension / outhouse -->
  <rect x="62" y="40" width="12" height="14" fill="currentColor" opacity="0.5"/>
  <polygon points="62,40 74,40 74,36 62,36" fill="currentColor" opacity="0.7"/>

  <!-- Left window (multi-pane) — cut out -->
  <rect x="22" y="38" width="14" height="10" fill="black" opacity="0.75"/>
  <line x1="29" y1="38" x2="29" y2="48" stroke="currentColor" stroke-width="1.2"/>
  <line x1="22" y1="43" x2="36" y2="43" stroke="currentColor" stroke-width="1.2"/>
  <line x1="25.5" y1="38" x2="25.5" y2="43" stroke="currentColor" stroke-width="0.7"/>
  <line x1="32.5" y1="38" x2="32.5" y2="43" stroke="currentColor" stroke-width="0.7"/>
  <line x1="25.5" y1="43" x2="25.5" y2="48" stroke="currentColor" stroke-width="0.7"/>
  <line x1="32.5" y1="43" x2="32.5" y2="48" stroke="currentColor" stroke-width="0.7"/>

  <!-- Right window (multi-pane) — cut out -->
  <rect x="42" y="38" width="14" height="10" fill="black" opacity="0.75"/>
  <line x1="49" y1="38" x2="49" y2="48" stroke="currentColor" stroke-width="1.2"/>
  <line x1="42" y1="43" x2="56" y2="43" stroke="currentColor" stroke-width="1.2"/>
  <line x1="45.5" y1="38" x2="45.5" y2="43" stroke="currentColor" stroke-width="0.7"/>
  <line x1="52.5" y1="38" x2="52.5" y2="43" stroke="currentColor" stroke-width="0.7"/>
  <line x1="45.5" y1="43" x2="45.5" y2="48" stroke="currentColor" stroke-width="0.7"/>
  <line x1="52.5" y1="43" x2="52.5" y2="48" stroke="currentColor" stroke-width="0.7"/>
</svg>
